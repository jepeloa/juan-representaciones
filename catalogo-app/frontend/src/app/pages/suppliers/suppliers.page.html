<div class="p-3 md:p-6 space-y-4 md:space-y-6">
    <div>
        <h2 class="font-display text-xl md:text-2xl font-bold text-slate-800">Marcas</h2>
        <p class="text-xs md:text-sm text-slate-500">{{ suppliers().length }} marcas</p>
    </div>

    <div class="grid gap-4 md:gap-5 grid-cols-2 md:grid-cols-3 lg:grid-cols-4 items-start">
        <div *ngFor="let s of suppliers()" class="card overflow-hidden flex flex-col hover:shadow-lift transition group">
            <a [routerLink]="['/catalogo']" [queryParams]="{ supplier: s.id }" class="block bg-cream-100">
                <img *ngIf="s.image; else noimg" [src]="s.image" loading="lazy" class="block w-full h-auto" alt=""/>
                <ng-template #noimg>
                    <div class="aspect-[4/3] flex items-center justify-center">
                        <span class="text-5xl font-bold text-brand-200 uppercase">{{ s.name[0] }}</span>
                    </div>
                </ng-template>
            </a>
            <div class="p-3 flex flex-col gap-1 flex-1">
                <a [routerLink]="['/catalogo']" [queryParams]="{ supplier: s.id }" class="block min-w-0">
                    <h3 class="font-semibold text-slate-800 truncate group-hover:text-brand-700">{{ s.name }}</h3>
                    <p class="text-xs text-slate-500 mt-0.5">{{ s.product_count }} producto<span *ngIf="s.product_count !== 1">s</span></p>
                </a>

                <!-- Condiciones de pago de la marca -->
                <button *ngIf="s.payment_conditions?.length"
                        (click)="openConditions(s, $event)"
                        class="mt-1 inline-flex items-center gap-1.5 text-xs font-medium text-brand-700 hover:text-brand-800 hover:underline self-start">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                        <path d="M3 5.25a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 5.25v13.5A2.25 2.25 0 0 1 18.75 21H5.25A2.25 2.25 0 0 1 3 18.75Zm4.5 4.5h9v1.5h-9zm0 4.5h6v1.5h-6z"/>
                    </svg>
                    Condiciones de pago
                </button>

                <!-- Carga de foto (solo admin) -->
                <div *ngIf="isAdmin" class="mt-2 flex items-center gap-2">
                    <label class="btn-outline text-xs cursor-pointer"
                           [class.opacity-60]="uploadingId() === s.id">
                        {{ uploadingId() === s.id ? 'Subiendo…' : (s.image ? 'Cambiar foto' : 'Subir foto') }}
                        <input type="file" accept="image/*" class="hidden"
                               (change)="onPick(s, $event)" [disabled]="uploadingId() === s.id"/>
                    </label>
                    <button *ngIf="s.image" class="btn-ghost text-xs text-blush-500 hover:bg-blush-50"
                            (click)="clearImage(s, $event)">Quitar</button>
                </div>
            </div>
        </div>
    </div>

    <div *ngIf="loading()" class="text-center py-12 text-slate-400">Cargando…</div>
</div>

<!-- Modal: condiciones de pago de la marca -->
<div *ngIf="conditionsOf() as s"
     class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm"
     (click)="closeConditions()">
    <div class="card max-w-md w-full overflow-hidden" (click)="$event.stopPropagation()">
        <div class="relative bg-brand-500 text-white px-5 py-4">
            <h3 class="font-display text-lg font-bold">Condiciones de pago</h3>
            <p class="text-sm text-white/90">{{ s.name }}</p>
            <button (click)="closeConditions()" aria-label="Cerrar"
                    class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="p-4 space-y-2 max-h-[60vh] overflow-y-auto">
            <div *ngFor="let c of s.payment_conditions" class="rounded-lg border border-cream-200 px-3 py-2">
                <p class="font-semibold text-slate-800">{{ c.name }}</p>
                <p *ngIf="c.description" class="text-sm text-slate-500">{{ c.description }}</p>
            </div>
        </div>
    </div>
</div>

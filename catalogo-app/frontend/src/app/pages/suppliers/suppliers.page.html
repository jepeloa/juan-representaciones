<div class="p-3 md:p-6 space-y-4 md:space-y-6">
    <div>
        <h2 class="font-display text-xl md:text-2xl font-bold text-slate-800">Marcas</h2>
        <p class="text-xs md:text-sm text-slate-500">{{ suppliers().length }} marcas</p>
    </div>

    <div class="grid gap-3 md:gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        <a *ngFor="let s of suppliers()"
           [routerLink]="['/catalogo']"
           [queryParams]="{ supplier: s.id }"
           class="card p-4 md:p-5 hover:shadow-lift hover:border-brand-200 transition group">
            <div class="flex items-start justify-between gap-2">
                <div class="flex-1 min-w-0">
                    <h3 class="font-semibold text-slate-800 truncate group-hover:text-brand-700">{{ s.name }}</h3>
                    <p class="text-xs text-slate-500 mt-0.5">{{ s.product_count }} producto<span *ngIf="s.product_count !== 1">s</span></p>
                </div>
                <div class="w-11 h-11 rounded-lg bg-brand-50 text-brand-600 flex items-center justify-center font-bold uppercase shrink-0">
                    {{ s.name[0] }}
                </div>
            </div>
            <div class="mt-3 flex items-center text-xs text-slate-400 group-hover:text-brand-600">
                Ver productos →
            </div>
        </a>
    </div>

    <div *ngIf="loading()" class="text-center py-12 text-slate-400">Cargando…</div>
</div>
